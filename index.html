<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Modern</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;font-family:'DM Mono',monospace;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,#1a0533 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,#001a33 0%,transparent 60%);z-index:0}
  .calc{position:relative;z-index:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:28px;width:340px;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(120,60,255,0.15)}
  .display{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px 24px;margin-bottom:20px;min-height:100px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end}
  .expr{color:rgba(255,255,255,0.3);font-size:13px;min-height:18px;word-break:break-all}
  .result{color:#fff;font-size:42px;font-weight:300;letter-spacing:-1px;word-break:break-all;line-height:1.1}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  button{border:none;border-radius:14px;height:68px;font-family:'DM Mono',monospace;font-size:18px;cursor:pointer;transition:all .15s ease;position:relative;overflow:hidden}
  button::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity .1s}
  button:active::after{opacity:.1}
  .btn-num{background:rgba(255,255,255,0.07);color:#fff;border:1px solid rgba(255,255,255,0.06)}
  .btn-num:hover{background:rgba(255,255,255,0.12)}
  .btn-op{background:rgba(120,60,255,0.2);color:#a070ff;border:1px solid rgba(120,60,255,0.3);font-size:22px}
  .btn-op:hover{background:rgba(120,60,255,0.35)}
  .btn-eq{background:linear-gradient(135deg,#7a3cff,#3c8fff);color:#fff;border:none;font-size:24px}
  .btn-eq:hover{filter:brightness(1.2)}
  .btn-fn{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.05);font-size:15px}
  .btn-fn:hover{background:rgba(255,255,255,0.09);color:#fff}
  .span2{grid-column:span 2}
  .title{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.2);text-transform:uppercase;text-align:center;margin-bottom:20px}
</style>
</head>
<body>
<div class="calc">
  <div class="title">Kalkulator</div>
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="grid">
    <button class="btn-fn" onclick="clearAll()">AC</button>
    <button class="btn-fn" onclick="toggleSign()">+/−</button>
    <button class="btn-fn" onclick="percent()">%</button>
    <button class="btn-op" onclick="setOp('/')">÷</button>
    <button class="btn-num" onclick="append('7')">7</button>
    <button class="btn-num" onclick="append('8')">8</button>
    <button class="btn-num" onclick="append('9')">9</button>
    <button class="btn-op" onclick="setOp('*')">×</button>
    <button class="btn-num" onclick="append('4')">4</button>
    <button class="btn-num" onclick="append('5')">5</button>
    <button class="btn-num" onclick="append('6')">6</button>
    <button class="btn-op" onclick="setOp('-')">−</button>
    <button class="btn-num" onclick="append('1')">1</button>
    <button class="btn-num" onclick="append('2')">2</button>
    <button class="btn-num" onclick="append('3')">3</button>
    <button class="btn-op" onclick="setOp('+')">+</button>
    <button class="btn-num span2" onclick="append('0')">0</button>
    <button class="btn-num" onclick="append('.')">.</button>
    <button class="btn-eq" onclick="calc()">=</button>
  </div>
</div>
<script>
let cur='0',prev='',op=null,fresh=false;
const R=document.getElementById('result'),E=document.getElementById('expr');
function upd(){R.textContent=cur.length>10?parseFloat(cur).toExponential(4):cur}
function append(v){
  if(fresh){cur='0';fresh=false}
  if(v==='.'&&cur.includes('.'))return;
  cur=cur==='0'&&v!=='.'?v:cur+v;upd();
}
function setOp(o){
  if(op&&!fresh)calc(true);
  prev=cur;op=o;fresh=true;
  E.textContent=prev+' '+({'+':'+','-':'−','*':'×','/':'÷'}[o]);
}
function calc(mid=false){
  if(!op||!prev)return;
  const a=parseFloat(prev),b=parseFloat(cur);
  let r;
  if(op==='+'&&r===undefined)r=a+b;
  if(op==='-')r=a-b;if(op==='*')r=a*b;
  if(op==='/')r=b===0?'Gabim':a/b;
  if(op==='+')r=a+b;
  E.textContent=prev+' '+({'+':'+','-':'−','*':'×','/':'÷'}[op])+' '+cur+(!mid?' =':'');
  cur=String(parseFloat(r.toFixed(10)));
  if(!mid){op=null;prev='';}
  fresh=true;upd();
}
function clearAll(){cur='0';prev='';op=null;fresh=false;E.textContent='';upd();}
function toggleSign(){cur=String(-parseFloat(cur));upd();}
function percent(){cur=String(parseFloat(cur)/100);upd();}
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')append(e.key);
  if(e.key==='.')append('.');
  if(e.key==='+'||e.key==='-'||e.key==='*'||e.key==='/')setOp(e.key);
  if(e.key==='Enter'||e.key==='=')calc();
  if(e.key==='Escape')clearAll();
  if(e.key==='Backspace'){cur=cur.length>1?cur.slice(0,-1):'0';upd();}
});
</script>
</body>
</html>
